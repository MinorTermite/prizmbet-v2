name: Update Matches

on:
  schedule:
    # 9:00 MSK = 6:00 UTC
    - cron: '0 6 * * *'
    # 21:00 MSK = 18:00 UTC
    - cron: '0 18 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-matches:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate matches.json
        run: python backend/api/generate_json.py
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_IO_KEY: ${{ secrets.ODDS_API_IO_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          PROXY_ENABLED: 'false'

      - name: Commit and push matches.json
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add frontend/matches.json
          git commit -m "chore(data): scheduled match update $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push || echo "Nothing to push"
