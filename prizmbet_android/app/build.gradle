plugins {
    id 'com.android.application'
}

android {
    namespace 'com.prizmbet.app'
    compileSdk 35

    defaultConfig {
        applicationId "com.prizmbet.app"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            // Отключаем ProGuard для простоты. В продакшене рекомендуется включить.
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    // Библиотека WebView находится в составе Android SDK; дополнительная зависимость webkit обеспечивает обратную совместимость
    implementation 'androidx.webkit:webkit:1.6.1'
}